<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        .body{
            margin:10px;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="body">
    <h1>Customer List</h1>
    <button onclick="loadCustomers()" class="btn btn-sm btn-primary">Load Customers</button>
    <table class="table table-striped table-hover">
       <thead>
           <tr>
               <td>Name</td>
               <td>Email</td>
               <td>Active</td>
           </tr>
       </thead>
        <tbody id="customers">

        </tbody>
    </table>

    <script>
        const url = 'https://localhost:4430/api/customers';

        const customersUI = document.getElementById("customers");

        async function loadCustomers() {
            //console.log('loading customers')
            let response = await fetch(url);
            let customers = await response.json();

            customersUI.innerHTML = "";

            for (let customer of customers) {

                const checked = customer.isActive ? "checked" : "";

                customersUI.innerHTML += `
                    <tr>
                        <td>${customer.name}</td>
                        <td>${customer.email}</t>
                        <td>
                            Active
                            <input type="checkbox"
                                ${checked}
                            >
                        </td>
                    </tr>                
                `
            }
            

        }
    </script>
</body>
</html>
