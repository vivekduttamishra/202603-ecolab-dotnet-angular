<h1>Customers</h1>

@if(this.fetched()){
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <td>Name</td>
                <td>Email</td>
                <td>Status</td>
                <td>Actions</td>
            </tr>
        </thead>

        <tbody>
            @for(customer of this.customers() ; track customer.email){
                <tr>
                    <td>{{customer.name}}</td>
                    <td>{{customer.email}}</td>
                    <td>
                        Active <input type="checkbox" [checked]="customer.isActive"/> 
                    </td>
                    <td>
                        <a class="btn btn-sm btn-primary"
                            [routerLink]="['/customers', customer.email]"
                        
                        >Details</a>
                    </td>
                </tr>
            }
        </tbody>
    </table>
} @else if (error()!==null) {
    <p class="text-error">{{error().message}}</p>
} @else {
   <img src="/loader07.gif"  /> 
}
