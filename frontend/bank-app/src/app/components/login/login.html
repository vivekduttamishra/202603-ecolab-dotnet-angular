 <div class="mb-5 hidden" id="loginSection">
    <h4>Login</h4>
    <div class="card p-4 col-md-6">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter email" [(ngModel)]="email">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter password" [(ngModel)]="password">
      </div>
      <button class="btn btn-primary w-100" (click)="handleLogin()">Login</button>
    </div>
  </div>
