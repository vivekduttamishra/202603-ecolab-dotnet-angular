<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Prime Finder</h1>
    <fieldset>
        <legend>Prime Range</legend>
        <label for="min">
            <input type="text" id="min" placeholder="Min">
        </label>
        <label for="max">
            <input type="text" id="max" placeholder="Max">
        </label>
        <button>Calculate</button>
    </fieldset>

    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Min</th>
                <th>Max</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>500000</td>
                <td>running</td>
            </tr>
            <tr>
                <td>2</td>
                <td>0</td>
                <td>100</td>
                <td>25</td>
            </tr>
            <tr>
                <td>3</td>
                <td>100</td>
                <td>2</td>
                <td>Range Error</td>
            </tr>
            <tr>
                <td>4</td>
                <td>2</td>
                <td>200000</td>
                <td>running</td>
            </tr>
        </tbody>
    </table>


</body>
</html>
