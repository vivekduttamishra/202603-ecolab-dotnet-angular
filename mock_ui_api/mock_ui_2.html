<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banking Demo UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f5f7fa; }
    .card { border-radius: 12px; }
    .navbar { margin-bottom: 20px; }
    .hidden { display: none; }
    .link-row { cursor: pointer; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">MyBank</a>

    <!-- NAVIGATION -->
    <div>
      <button class="btn btn-light me-2" onclick="navigate('dashboard')">Dashboard</button>
      <button class="btn btn-light me-2" onclick="navigate('transactions')">Transactions</button>
      <button class="btn btn-light me-2" onclick="navigate('openAccount')">Open Account</button>
      <button class="btn btn-warning me-2" id="managerNav" onclick="navigate('manager')">Manager</button>
      <button class="btn btn-light" id="loginBtn" onclick="showLogin()">Login</button>
      <button class="btn btn-danger hidden" id="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container">

  <!-- LOGIN -->
  <div class="mb-5 hidden" id="loginSection">
    <h4>Login</h4>
    <div class="card p-4 col-md-6">
      <div class="mb-3">
        <label>Email</label>
        <input id="email" class="form-control" placeholder="Enter email">
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>
      <button class="btn btn-primary w-100" onclick="fakeLogin()">Login</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardSection">
    <h4>Account Summary</h4>
    <div class="row">
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Savings Account</h5>
          <p>Acc No: 123456789</p>
          <h3>₹50,000</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="transactionsSection" class="hidden">
    <h4>Transactions</h4>

    <!-- ACTION -->
    <div class="card p-3 mb-3">
      <div class="row g-3">
        <div class="col-md-3">
          <select class="form-select" id="txnType" onchange="toggleTransfer()">
            <option value="deposit">Deposit</option>
            <option value="withdraw">Withdraw</option>
            <option value="transfer">Transfer</option>
          </select>
        </div>
        <div class="col-md-3">
          <input id="amount" class="form-control" placeholder="Amount">
        </div>
        <div class="col-md-3 hidden" id="transferField">
          <input class="form-control" placeholder="To Account">
        </div>
        <div class="col-md-3">
          <button class="btn btn-success w-100">Submit</button>
        </div>
      </div>
    </div>

    <!-- LIST -->
    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr class="link-row" onclick="showDetails()">
          <td>03 Mar</td>
          <td>Transfer</td>
          <td>₹2,000</td>
          <td><span class="badge bg-warning">Pending</span></td>
        </tr>
      </tbody>
    </table>

    <!-- DETAILS -->
    <div id="txnDetails" class="hidden">
      <div class="card p-3">
        <h5>Transaction Details</h5>
        <p>Status: <span class="badge bg-warning">Pending</span></p>
        <input id="disputeReason" class="form-control mb-2" placeholder="Reason">
        <button class="btn btn-danger" onclick="submitDispute()">Dispute</button>
      </div>
    </div>
  </div>

  <!-- OPEN ACCOUNT -->
  <div id="openAccountSection" class="hidden">
    <h4>Open Account</h4>
    <div class="card p-3">
      <input class="form-control mb-2" placeholder="Name">
      <input class="form-control mb-2" placeholder="Email">
      <button class="btn btn-primary">Submit</button>
    </div>
  </div>

  <!-- MANAGER -->
  <div id="managerSection" class="hidden">
    <h4>Manager Panel</h4>

    <h5>Disputes</h5>
    <table class="table">
      <tbody id="disputeTable"></tbody>
    </table>
  </div>

</div>

<script>
  let isManager = false;

  function navigate(section) {
    ['dashboard','transactions','openAccount','manager'].forEach(s => {
      document.getElementById(s+'Section').classList.add('hidden');
    });
    document.getElementById(section+'Section').classList.remove('hidden');
  }

  function showLogin() {
    document.getElementById('loginSection').classList.remove('hidden');
  }

  function fakeLogin() {
    const email = document.getElementById('email').value;

    isManager = email.includes('manager');

    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('loginBtn').classList.add('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');

    if (!isManager) {
      document.getElementById('managerNav').classList.add('hidden');
    }
  }

  function logout() {
    location.reload();
  }

  function toggleTransfer() {
    const type = document.getElementById('txnType').value;
    document.getElementById('transferField').classList.toggle('hidden', type !== 'transfer');
  }

  function showDetails() {
    document.getElementById('txnDetails').classList.remove('hidden');
  }

  function submitDispute() {
    const reason = document.getElementById('disputeReason').value;
    const table = document.getElementById('disputeTable');

    table.innerHTML += `<tr>
      <td>₹2,000</td>
      <td>${reason}</td>
      <td><button class="btn btn-success btn-sm">Resolve</button></td>
    </tr>`;

    alert('Dispute submitted');
  }
</script>

</body>
</html>
